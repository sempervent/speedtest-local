services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-speedtest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-speedtest}
      POSTGRES_DB: ${POSTGRES_DB:-speedtest}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://speedtest:speedtest@postgres:5432/speedtest}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      SERVER_LABEL: ${SERVER_LABEL:-default}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

  # Hourly headless runs against the API (same network as backend).
  # docker compose --profile probe up -d probe-scheduled
  probe-scheduled:
    profiles: ["probe"]
    build:
      context: ./probe-agent
    depends_on:
      backend:
        condition: service_healthy
    command:
      - sh
      - -c
      - "while true; do probe run --server http://backend:8000 || true; sleep 3600; done"
    restart: unless-stopped

volumes:
  pgdata:
