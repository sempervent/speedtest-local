server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Default nginx limit is 1m; browser upload tests POST multi‑MiB bodies to /api/upload.
    client_max_body_size 512m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ^~ stops other prefix/regex locations from stealing /api/* (would otherwise fall through to SPA → HTML).
    # proxy_pass with no URI path forwards the client URI unchanged (e.g. GET /api/config → upstream /api/config).
    location ^~ /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    location /ready {
        proxy_pass http://backend:8000/ready;
        proxy_set_header Host $host;
    }

    location /metrics {
        proxy_pass http://backend:8000/metrics;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://backend:8000/redoc;
        proxy_set_header Host $host;
    }

    location = /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
